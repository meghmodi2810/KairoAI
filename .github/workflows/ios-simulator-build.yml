name: iOS Simulator Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-ios-simulator:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Materialize Firebase iOS plist from secret
        env:
          FIREBASE_IOS_PLIST_BASE64: ${{ secrets.FIREBASE_IOS_PLIST_BASE64 }}
        run: |
          if [ -z "$FIREBASE_IOS_PLIST_BASE64" ]; then
            echo "FIREBASE_IOS_PLIST_BASE64 secret is not configured." >&2
            exit 1
          fi
          echo "$FIREBASE_IOS_PLIST_BASE64" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Build iOS simulator app
        run: flutter build ios --simulator --debug

      - name: Upload iOS simulator app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: build/ios/iphonesimulator/Runner.app
          if-no-files-found: error
