<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sanket - ISL Learning Home</title>
    <style>
        /* Core Theme Colors */
        :root {
            --bg-main: #0a0b14; /* Deep space charcoal */
            --accent-cyan: #00f2ea; /* Synthetic glow cyan */
            --accent-purple: #8a2be2; /* Deep neon purple */
            --glass-panel: rgba(255, 255, 255, 0.08); /* For glassmorphism */
        }

        body {
            background-color: var(--bg-main);
            color: #ffffff;
            font-family: 'Inter', sans-serif; /* Modern, clean sans-serif */
            margin: 0;
            /* Subtle animated gradient background */
            background-image: radial-gradient(circle at 20% 30%, rgba(138, 43, 226, 0.15) 0%, transparent 50%),
                              radial-gradient(circle at 80% 70%, rgba(0, 242, 234, 0.15) 0%, transparent 50%);
            background-attachment: fixed;
        }

        /* Utility Classes for the "Synthetic" look */
        .glass-effect {
            background: var(--glass-panel);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .synthetic-glow {
            box-shadow: 0 0 20px rgba(0, 242, 234, 0.3);
        }
    </style>
</head>

<body class="h-screen overflow-hidden flex flex-col">

    <header class="glass-effect fixed top-0 w-full z-50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <img src="/assets/logo-glow.svg" alt="Sanket Logo" class="h-8 w-8 synthetic-glow rounded-full">
            <span class="text-xl font-bold tracking-wide bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-purple-500">
                Sanket
            </span>
        </div>

        <div class="flex items-center space-x-6 font-semibold">
            <div class="flex items-center space-x-2 text-orange-400">
                <img src="/assets/3d-flame.png" class="h-6 w-6" alt="Streak">
                <span>12</span>
            </div>
            <div class="flex items-center space-x-2 text-cyan-400">
                 <img src="/assets/3d-crystal.png" class="h-6 w-6" alt="Gems">
                <span>450</span>
            </div>
            <div class="h-10 w-10 rounded-full bg-purple-900 border-2 border-cyan-400 overflow-hidden ring-4 ring-purple-500/20">
                <img src="/assets/user-avatar.png" alt="Profile" class="object-cover">
            </div>
        </div>
    </header>


    <main class="flex-grow overflow-y-auto pt-24 pb-28 px-4 relative no-scrollbar">
        
        <div class="max-w-lg mx-auto relative">

            <div class="absolute left-1/2 transform -translate-x-1/2 h-full w-1 bg-gradient-to-b from-cyan-500/50 via-purple-500/30 to-transparent z-0"></div>

            <div class="glass-effect rounded-2xl p-6 mb-12 relative z-10 overflow-hidden">
                <img src="/assets/3d-hands-greeting-bg.png" class="absolute right-0 top-0 h-full opacity-20 mix-blend-overlay" alt="">
                <h2 class="text-gray-400 text-sm uppercase tracking-wider font-bold mb-2">Unit 1</h2>
                <h1 class="text-3xl font-extrabold text-white">Basics & Greetings</h1>
                <p class="text-gray-300 mt-2">Master common phrases and the alphabet.</p>
            </div>


            <div class="flex flex-col items-center space-y-8 relative z-10">

                <button class="relative group">
                    <div class="h-24 w-24 rounded-full bg-gradient-to-br from-cyan-600 to-cyan-800 flex items-center justify-center shadow-[0_0_30px_rgba(0,242,234,0.5)] border-4 border-cyan-300">
                        <img src="/assets/3d-icon-wave.png" class="h-12 w-12 drop-shadow-lg" alt="Lesson 1">
                    </div>
                    <div class="absolute top-full mt-3 text-center w-full text-sm font-bold text-cyan-300">
                        Lesson 1: Hello
                    </div>
                </button>

                <button class="relative group transform scale-110">
                     <div class="absolute -top-4 bg-white text-bg-main text-xs font-black px-3 py-1 rounded-full uppercase tracking-widest shadow-lg">
                        Start Here
                    </div>
                    <div class="h-28 w-28 rounded-full bg-gradient-to-br from-purple-600 to-cyan-600 flex items-center justify-center shadow-[0_0_50px_rgba(138,43,226,0.6)] border-[5px] border-white ring-4 ring-purple-500/30 animate-pulse-slow">
                        <img src="/assets/3d-icon-me.png" class="h-14 w-14 drop-shadow-xl" alt="Lesson 2">
                    </div>
                     <div class="absolute top-full mt-4 text-center w-full text-base font-bold text-white">
                        Lesson 2: My Name Is...
                    </div>
                </button>

                <button class="relative group opacity-70 cursor-not-allowed">
                    <div class="h-24 w-24 rounded-full glass-effect bg-white/5 flex items-center justify-center border-4 border-white/10 grayscale">
                        <img src="/assets/3d-icon-alphabet.png" class="h-12 w-12 opacity-50" alt="Lesson 3">
                         <div class="absolute inset-0 flex items-center justify-center">
                             <svg class="h-8 w-8 text-gray-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"></path></svg>
                         </div>
                    </div>
                    <div class="absolute top-full mt-3 text-center w-full text-sm font-bold text-gray-500">
                        Lesson 3: The Alphabet
                    </div>
                </button>

                 <div class="pt-8 pb-4">
                    <div class="glass-effect px-8 py-6 rounded-3xl flex items-center space-x-6 border-2 border-purple-500/30 shadow-[0_0_40px_rgba(138,43,226,0.2)]">
                        <img src="/assets/3d-chest-closed.png" class="h-20 w-20 synthetic-glow" alt="Checkpoint">
                        <div>
                            <h3 class="text-xl font-bold text-purple-300">Unit 1 Checkpoint</h3>
                            <p class="text-gray-400 text-sm">Prove your skills to unlock Unit 2.</p>
                        </div>
                    </div>
                 </div>
            </div> </div>
    </main>


    <nav class="glass-effect fixed bottom-0 w-full pb-6 pt-4 px-8 z-50 rounded-t-3xl border-t border-white/10">
        <div class="flex justify-between items-center max-w-lg mx-auto relative">
            
            <div class="absolute top-0 left-[12%] -translate-x-1/2 w-12 h-1 bg-cyan-400 rounded-full shadow-[0_0_20px_cyan]"></div>

            <button class="flex flex-col items-center space-y-1 text-cyan-400">
                <svg class="h-7 w-7 drop-shadow-[0_0_10px_rgba(0,242,234,0.8)]" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
                <span class="text-xs font-bold">Learn</span>
            </button>

            <button class="flex flex-col items-center space-y-1 text-gray-500 hover:text-gray-300 transition-colors">
                <svg class="h-7 w-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                <span class="text-xs font-medium">Rank</span>
            </button>

             <button class="flex flex-col items-center space-y-1 text-gray-500 hover:text-gray-300 transition-colors">
               <svg class="h-7 w-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span class="text-xs font-medium">Quests</span>
            </button>

            <button class="flex flex-col items-center space-y-1 text-gray-500 hover:text-gray-300 transition-colors">
                <svg class="h-7 w-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                <span class="text-xs font-medium">Profile</span>
            </button>
        </div>
    </nav>

</body>
</html>
